<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Venom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #110d16;
      --fg:           #f0ebe8;
      --muted:        #948592;
      --accent:       #c4b6c0;
      --soft:         #5a4f5a;
      --border:       rgba(255, 230, 220, 0.08);
      --border-strong:rgba(255, 230, 220, 0.18);
      --card-bg:      #1c1620;
      --hover-tint:   rgba(255, 195, 200, 0.06);
      --highlight:    #ffe14a;
      --gold:         #d4ac56;
      --gold-soft:    rgba(212, 172, 86, 0.30);
      --pill:         #ff7088;
      --pill-fg:      #1a1018;
      --spotlight:
        radial-gradient(ellipse 60vw 40vh at 25% -5vh,
          rgba(255, 200, 170, 0.08) 0%, rgba(255, 200, 170, 0.02) 40%, transparent 70%),
        radial-gradient(ellipse 60vw 40vh at 75% -5vh,
          rgba(255, 130, 165, 0.08) 0%, rgba(255, 130, 165, 0.02) 40%, transparent 70%);
      --font-ui:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'Bebas Neue', 'Oswald', 'Helvetica Neue', Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      font-family: var(--font-ui);
      max-width: 880px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      color: var(--fg);
      background: transparent;
      line-height: 1.6;
      isolation: isolate;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--spotlight);
      pointer-events: none;
      z-index: -1;
    }
    a { color: inherit; text-decoration: none; }
    header { margin-bottom: 2.5rem; }
    h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 3.4rem;
      letter-spacing: 0.06em;
      margin: 0 0 0.4rem;
      color: var(--fg);
      text-transform: uppercase;
    }
    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin: 0;
      letter-spacing: 0.02em;
    }
    .status-banner {
      padding: 1rem 1.25rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold-soft);
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--accent);
      margin-bottom: 2rem;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .project-card {
      display: block;
      padding: 1.25rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
    }
    a.project-card:hover {
      border-color: var(--gold-soft);
      background: var(--hover-tint);
    }
    a.project-card:active { transform: translateY(1px); }
    .project-card.placeholder { opacity: 0.5; }
    .project-card h3 {
      margin: 0 0 0.5rem;
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--fg);
    }
    .project-card p {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
      color: var(--accent);
    }
    .pill {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Shadow Venom</h1>
    <p class="tagline">Indie game projects.</p>
  </header>

  <div class="status-banner">
    Site is in early development. More project pages and companion tools coming soon.
  </div>

  <section class="projects">
    <a href="produce69/" class="project-card">
      <h3>Produce 69</h3>
      <p>Idol production simulation.</p>
      <span class="pill">Companion tools available</span>
    </a>

    <article class="project-card placeholder">
      <h3>Casino 69</h3>
      <p>&mdash;</p>
      <span class="pill">Coming soon</span>
    </article>
  </section>

  <footer>
    &copy; Shadow Venom
  </footer>
</body>
</html>
