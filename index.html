<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta_title_hub">Shadow Venom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <script>
    window.I18N_BASE_PATH = 'i18n/';
    window.I18N_META_TITLE_KEY = 'meta_title_hub';
  </script>
  <script defer src="i18n/i18n.js"></script>
  <style>
    :root {
      --bg:           #110d16;
      --fg:           #f0ebe8;
      --muted:        #948592;
      --accent:       #c4b6c0;
      --soft:         #5a4f5a;
      --border:       rgba(255, 230, 220, 0.08);
      --border-strong:rgba(255, 230, 220, 0.18);
      --card-bg:      #1c1620;
      --hover-tint:   rgba(255, 195, 200, 0.06);
      --highlight:    #ffe14a;
      --gold:         #d4ac56;
      --gold-soft:    rgba(212, 172, 86, 0.30);
      --pill:         #ff7088;
      --pill-fg:      #1a1018;
      --spotlight:
        radial-gradient(ellipse 70vw 55vh at 22% 8vh,
          rgba(255, 200, 170, 0.22) 0%, rgba(255, 200, 170, 0.07) 32%, transparent 60%),
        radial-gradient(ellipse 70vw 55vh at 78% 8vh,
          rgba(255, 130, 165, 0.22) 0%, rgba(255, 130, 165, 0.07) 32%, transparent 60%);
      --font-ui:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'Bebas Neue', 'Oswald', 'Helvetica Neue', Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html {
      background-image: var(--spotlight);
      background-color: var(--bg);
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
    }
    body {
      font-family: var(--font-ui);
      max-width: 880px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      color: var(--fg);
      background: transparent;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    header { margin-bottom: 2.5rem; }
    h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 3.4rem;
      letter-spacing: 0.06em;
      margin: 0 0 0.4rem;
      color: var(--fg);
      text-transform: uppercase;
    }
    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin: 0;
      letter-spacing: 0.02em;
    }
    .status-banner {
      padding: 1rem 1.25rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold-soft);
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--accent);
      margin-bottom: 2rem;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .project-card {
      display: block;
      padding: 1.25rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
    }
    a.project-card:hover {
      border-color: var(--gold-soft);
      background: var(--hover-tint);
    }
    a.project-card:active { transform: translateY(1px); }
    .project-card.placeholder { opacity: 0.5; }
    .project-card h3 {
      margin: 0 0 0.5rem;
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--fg);
    }
    .project-card p {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
      color: var(--accent);
    }
    .project-card .series-name {
      font-family: var(--font-display);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 0.6rem;
      opacity: 0.85;
    }
    .pill {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
    .lang-switcher {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      display: inline-flex;
      gap: 0.15rem;
      font-family: var(--font-ui);
      font-size: 0.75rem;
    }
    .lang-switcher button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font: inherit;
      cursor: pointer;
      padding: 0.32rem 0.55rem;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }
    .lang-switcher button:hover {
      color: var(--fg);
      border-color: var(--gold-soft);
    }
    .lang-switcher button.active {
      color: var(--gold);
      border-color: var(--gold-soft);
      background: var(--gold-bg);
    }
    /* CJK locale tweaks (kept conservative — display surfaces only) */
    html.cjk h1            { font-size: 3rem; letter-spacing: 0.04em; }
    html.cjk .project-card h3 { font-size: 1.2rem; letter-spacing: 0.02em; }
    html.cjk .pill,
    html.cjk .project-card .series-name { font-size: 0.78rem; }
  </style>
</head>
<body>
  <div class="lang-switcher" role="radiogroup" aria-label="Language">
    <button data-lang="en">EN</button>
    <button data-lang="ja">日本語</button>
    <button data-lang="ko">한국어</button>
    <button data-lang="zh-Hant">繁中</button>
  </div>

  <header>
    <h1 data-i18n="hub_h1">Shadow Venom</h1>
    <p class="tagline" data-i18n="hub_tagline">Building parallel worlds for VAM.</p>
  </header>

  <div class="status-banner" data-i18n="hub_status">
    Quietly warming up. More worlds and companion tools &mdash; landing soon.
  </div>

  <section class="projects">
    <a href="produce69/" class="project-card">
      <h3 data-i18n="hub_card_p69_h">Produce 69</h3>
      <p class="series-name" data-i18n="hub_card_p69_series">VaM Produce 69 II</p>
      <p data-i18n="hub_card_p69_desc">Idol production stage. Bring your favorites under the spotlight.</p>
      <span class="pill" data-i18n="hub_card_p69_pill">Companion tools available</span>
    </a>

    <article class="project-card placeholder">
      <h3 data-i18n="hub_card_c69_h">Casino 69</h3>
      <p>&mdash;</p>
      <span class="pill" data-i18n="hub_card_c69_pill">Coming soon</span>
    </article>
  </section>

  <footer>
    &copy; Shadow Venom
  </footer>
</body>
</html>
